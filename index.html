<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chromatic — Cosmic Portal Visualizer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bass: #ff0066;
            --mid: #00ffaa;
            --treble: #6600ff;
            --bg: #050508;
        }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            overflow: hidden;
            color: #fff;
        }
        
        canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
        
        /* Start Screen */
        .start-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(ellipse at center, #0a0a15 0%, #050508 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.8s;
        }
        
        .start-screen.hidden { opacity: 0; pointer-events: none; }
        
        .start-title {
            font-size: clamp(3rem, 12vw, 7rem);
            font-weight: 300;
            letter-spacing: 0.4em;
            margin-bottom: 5px;
            background: linear-gradient(135deg, var(--bass), var(--mid), var(--treble), var(--bass));
            background-size: 300% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 4s linear infinite;
        }
        
        @keyframes shimmer {
            0% { background-position: 0% 50%; }
            100% { background-position: 300% 50%; }
        }
        
        .start-subtitle {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.35);
            letter-spacing: 0.4em;
            margin-bottom: 50px;
            text-transform: uppercase;
        }
        
        #startBtn {
            padding: 20px 60px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 400;
            letter-spacing: 0.3em;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.4s;
            text-transform: uppercase;
        }
        
        #startBtn:hover:not(:disabled) {
            background: rgba(255,255,255,0.05);
            border-color: var(--mid);
            box-shadow: 0 0 40px rgba(0,255,170,0.2);
        }
        
        #startBtn:disabled { opacity: 0.4; cursor: not-allowed; }
        #startBtn.error { border-color: var(--bass); color: var(--bass); }
        
        .start-note {
            margin-top: 20px;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.25);
            text-align: center;
            max-width: 350px;
            line-height: 1.6;
        }
        
        /* UI Elements */
        .ui-element {
            position: fixed;
            z-index: 50;
            opacity: 0;
            transition: opacity 0.4s;
        }
        .ui-element.visible { opacity: 1; }
        
        .settings-btn {
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
        }
        
        .settings-btn:hover { background: rgba(255,255,255,0.1); }
        
        /* Info Bars */
        .info-bar {
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            padding: 8px 20px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .info-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        
        .info-label {
            font-size: 0.55rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.35);
        }
        
        .info-bar-fill {
            width: 40px;
            height: 3px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
        }
        
        .info-bar-fill-inner {
            height: 100%;
            border-radius: 2px;
            transition: width 0.03s;
        }
        
        .bass-fill { background: var(--bass); box-shadow: 0 0 6px var(--bass); }
        .mid-fill { background: var(--mid); box-shadow: 0 0 6px var(--mid); }
        .treble-fill { background: var(--treble); box-shadow: 0 0 6px var(--treble); }
        
        /* Viz Selector */
        .viz-selector {
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            padding: 10px 15px;
            max-width: 95vw;
            overflow-x: auto;
            scroll-behavior: smooth;
            scrollbar-width: none;
            -ms-overflow-style: none;
            justify-content: flex-start;
        }
        
        .viz-selector::-webkit-scrollbar { display: none; }
        
        .viz-btn {
            flex-shrink: 0;
            padding: 10px 16px;
            font-family: inherit;
            font-size: 0.65rem;
            letter-spacing: 0.1em;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.12);
            color: rgba(255,255,255,0.55);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            white-space: nowrap;
        }
        
        .viz-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .viz-btn.active { background: rgba(0,255,170,0.15); border-color: var(--mid); color: var(--mid); }
        
        /* Settings Panel */
        .settings-panel {
            position: fixed;
            top: 0; right: 0;
            width: min(380px, 90vw);
            height: 100%;
            background: rgba(5,5,10,0.95);
            backdrop-filter: blur(30px);
            border-left: 1px solid rgba(255,255,255,0.08);
            z-index: 60;
            transform: translateX(100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-y: auto;
            padding: 35px 30px;
        }
        
        .settings-panel.open { transform: translateX(0); }
        
        .settings-title {
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            margin-bottom: 35px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .close-btn {
            width: 38px;
            height: 38px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            cursor: pointer;
            color: #fff;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .settings-section { margin-bottom: 30px; }
        
        .settings-section-title {
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            margin-bottom: 18px;
        }
        
        .slider-control { margin-bottom: 22px; }
        
        .slider-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.85rem;
        }
        
        .slider-value { color: var(--mid); font-weight: 600; }
        
        input[type="range"] {
            width: 100%;
            height: 4px;
            -webkit-appearance: none;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            outline: none;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: linear-gradient(135deg, var(--mid), var(--treble));
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0,255,170,0.5);
        }
        
        .theme-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }
        
        .theme-option {
            aspect-ratio: 1;
            border-radius: 10px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s;
        }
        
        .theme-option:hover { transform: scale(1.08); }
        .theme-option.active { border-color: #fff; box-shadow: 0 0 15px rgba(255,255,255,0.3); }
        
        .btn-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .bg-btn {
            padding: 10px 16px;
            font-family: inherit;
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.6);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }
        
        .bg-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .bg-btn.active { background: rgba(0,255,170,0.15); border-color: var(--mid); color: var(--mid); }
        
        /* Overlay */
        .overlay-backdrop {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 55;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        
        .overlay-backdrop.visible { opacity: 1; pointer-events: auto; }
        
        /* Mobile */
        @media (max-width: 600px) {
            .viz-selector { bottom: 20px; padding: 8px 10px; }
            .info-bar { bottom: 75px; }
            .settings-panel { width: 100%; border-left: none; border-top: 1px solid rgba(255,255,255,0.08); }
        }
        
        @media (max-height: 500px) and (orientation: landscape) {
            .viz-selector { top: 20px; bottom: auto; }
            .info-bar { top: 80px; bottom: auto; }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div class="start-screen" id="startScreen">
        <h1 class="start-title">CHROMATIC</h1>
        <p class="start-subtitle">Cosmic Portal Visualizer</p>
        <button id="startBtn" onclick="handleMicClick()">Connect Microphone</button>
        <p class="start-note" id="startNote">Enable microphone access to transform your music into visual experiences</p>
    </div>
    
    <div class="ui-element settings-btn" id="settingsBtn" onclick="toggleSettings()">⚙️</div>
    
    <div class="ui-element info-bar" id="infoBar">
        <div class="info-item">
            <span class="info-label">Bass</span>
            <div class="info-bar-fill"><div class="info-bar-fill-inner bass-fill" id="bassBar" style="width:0%"></div></div>
        </div>
        <div class="info-item">
            <span class="info-label">Mid</span>
            <div class="info-bar-fill"><div class="info-bar-fill-inner mid-fill" id="midBar" style="width:0%"></div></div>
        </div>
        <div class="info-item">
            <span class="info-label">Treble</span>
            <div class="info-bar-fill"><div class="info-bar-fill-inner treble-fill" id="trebleBar" style="width:0%"></div></div>
        </div>
    </div>
    
    <div class="ui-element viz-selector" id="vizSelector">
        <button class="viz-btn active" onclick="setViz('portal')">Portal</button>
        <button class="viz-btn" onclick="setViz('nebula')">Nebula</button>
        <button class="viz-btn" onclick="setViz('rings')">Rings</button>
        <button class="viz-btn" onclick="setViz('pulses')">Pulses</button>
        <button class="viz-btn" onclick="setViz('waves')">Waves</button>
        <button class="viz-btn" onclick="setViz('shards')">Shards</button>
        <button class="viz-btn" onclick="setViz('kaleido')">Kaleido</button>
        <button class="viz-btn" onclick="setViz('tunnel')">Tunnel</button>
        <button class="viz-btn" onclick="setViz('terrain')">Terrain</button>
        <button class="viz-btn" onclick="setViz('fire')">Fire</button>
        <button class="viz-btn" onclick="setViz('mushroom')">Mushroom</button>
        <button class="viz-btn" onclick="setViz('sacred')">Sacred</button>
        <button class="viz-btn" onclick="setViz('lysergic')">Lysergic</button>
        <button class="viz-btn" onclick="setViz('tool')">TOOL</button>
        <button class="viz-btn" onclick="setViz('cosmic')">Cosmic</button>
    </div>
    
    <div class="overlay-backdrop" id="overlayBackdrop" onclick="toggleSettings()"></div>
    
    <div class="settings-panel" id="settingsPanel">
        <div class="settings-title">
            <span>Settings</span>
            <button class="close-btn" onclick="toggleSettings()">✕</button>
        </div>
        
        <div class="settings-section">
            <div class="settings-section-title">Audio Response</div>
            <div class="slider-control">
                <div class="slider-label"><span>Sensitivity</span><span class="slider-value" id="sensitivityVal">100%</span></div>
                <input type="range" id="sensitivity" min="50" max="400" value="100" oninput="updateSetting('sensitivity', this.value)">
            </div>
            <div class="slider-control">
                <div class="slider-label"><span>Smoothing</span><span class="slider-value" id="smoothingVal">50%</span></div>
                <input type="range" id="smoothing" min="0" max="90" value="50" oninput="updateSetting('smoothing', this.value)">
            </div>
            <div class="slider-control">
                <div class="slider-label"><span>Treble Boost</span><span class="slider-value" id="trebleBoostVal">100%</span></div>
                <input type="range" id="trebleBoost" min="50" max="300" value="100" oninput="updateSetting('trebleBoost', this.value)">
            </div>
        </div>
        
        <div class="settings-section">
            <div class="settings-section-title">Visual</div>
            <div class="slider-control">
                <div class="slider-label"><span>Speed</span><span class="slider-value" id="speedVal">100%</span></div>
                <input type="range" id="speed" min="20" max="300" value="100" oninput="updateSetting('speed', this.value)">
            </div>
            <div class="slider-control">
                <div class="slider-label"><span>Intensity</span><span class="slider-value" id="intensityVal">100%</span></div>
                <input type="range" id="intensity" min="20" max="200" value="100" oninput="updateSetting('intensity', this.value)">
            </div>
            <div class="slider-control">
                <div class="slider-label"><span>Trails</span><span class="slider-value" id="trailVal">30%</span></div>
                <input type="range" id="trail" min="0" max="95" value="30" oninput="updateSetting('trail', this.value)">
            </div>
        </div>
        
        <div class="settings-section">
            <div class="settings-section-title">Background</div>
            <div class="btn-group" id="bgSelector">
                <button class="bg-btn active" onclick="setBackground('solid')">Solid</button>
                <button class="bg-btn" onclick="setBackground('inverted')">Inverted</button>
                <button class="bg-btn" onclick="setBackground('stars')">Stars</button>
                <button class="bg-btn" onclick="setBackground('particles')">Particles</button>
                <button class="bg-btn" onclick="setBackground('nebula')">Nebula</button>
            </div>
        </div>
        
        <div class="settings-section">
            <div class="settings-section-title">Themes</div>
            <div class="theme-grid" id="themeGrid"></div>
        </div>
    </div>

    <script>
        // === STATE ===
        let audioCtx = null, analyser = null, dataArray = null;
        let sensitivity = 100, smoothing = 0.5, trebleBoost = 100;
        let speed = 1, intensity = 1, trailAmount = 0.7;
        let currentViz = 'portal', currentTheme = 'cosmic', isStarted = false;
        let currentBg = 'solid';
        let time = 0;
        
        // Background particles storage
        let bgParticles = [];
        let bgStars = [];
        
        // Themes
        const themes = {
            cosmic: { bass: '#ff0066', mid: '#00ffaa', treble: '#6600ff', bg: '#050508' },
            fire: { bass: '#ff2200', mid: '#ff6600', treble: '#ffcc00', bg: '#080505' },
            ocean: { bass: '#0066ff', mid: '#00ccff', treble: '#66ffff', bg: '#050810' },
            neon: { bass: '#ff00ff', mid: '#00ffff', treble: '#ff00aa', bg: '#050508' },
            gold: { bass: '#ff8800', mid: '#ffcc00', treble: '#ffff66', bg: '#080606' },
            aurora: { bass: '#00ff88', mid: '#88ff00', treble: '#ff00ff', bg: '#050508' },
            blood: { bass: '#cc0000', mid: '#ff3333', treble: '#ff6666', bg: '#080505' },
            ice: { bass: '#00aaff', mid: '#66ddff', treble: '#ffffff', bg: '#05080c' },
            toxic: { bass: '#00ff00', mid: '#88ff00', treble: '#ffff00', bg: '#050805' },
            vapor: { bass: '#ff00ff', mid: '#cc00ff', treble: '#00ffff', bg: '#050508' }
        };
        
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initBackgroundElements();
        }
        window.addEventListener('resize', resize);
        resize();
        
        function initBackgroundElements() {
            // Init stars
            bgStars = [];
            const numStars = Math.floor(canvas.width * canvas.height / 8000);
            for (let i = 0; i < numStars; i++) {
                bgStars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 0.5,
                    alpha: Math.random() * 0.5 + 0.2,
                    twinkleSpeed: Math.random() * 0.02 + 0.01
                });
            }
            
            // Init particles
            bgParticles = [];
            const numParticles = Math.floor(canvas.width * canvas.height / 15000);
            for (let i = 0; i < numParticles; i++) {
                bgParticles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: (Math.random() - 0.5) * 0.5,
                    size: Math.random() * 3 + 1,
                    alpha: Math.random() * 0.4 + 0.1
                });
            }
        }
        
        // === AUDIO ===
        async function handleMicClick() {
            const btn = document.getElementById('startBtn');
            btn.textContent = 'Requesting...';
            btn.disabled = true;
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                btn.textContent = 'Setting up...';
                
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 1024;
                analyser.smoothingTimeConstant = smoothing;
                
                const source = audioCtx.createMediaStreamSource(stream);
                source.connect(analyser);
                
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                
                document.getElementById('startScreen').classList.add('hidden');
                document.querySelectorAll('.ui-element').forEach(el => el.classList.add('visible'));
                
                isStarted = true;
                requestAnimationFrame(animate);
                
            } catch (err) {
                btn.disabled = false;
                btn.textContent = 'Retry Connection';
                btn.classList.add('error');
                document.getElementById('startNote').textContent = err.message === 'Permission denied' 
                    ? 'Please allow microphone access in browser settings' 
                    : 'Error: ' + err.message;
            }
        }
        
        function getBands() {
            if (!analyser) return { bass: 0, mid: 0, treble: 0 };
            
            analyser.getByteFrequencyData(dataArray);
            const len = dataArray.length;
            
            const bassEnd = Math.floor(len * 0.1);
            const midEnd = Math.floor(len * 0.5);
            
            let bassSum = 0, midSum = 0, trebleSum = 0;
            for (let i = 0; i < bassEnd; i++) bassSum += dataArray[i];
            for (let i = bassEnd; i < midEnd; i++) midSum += dataArray[i];
            for (let i = midEnd; i < len; i++) trebleSum += dataArray[i];
            
            let bass = (bassSum / bassEnd / 255) * (sensitivity / 100);
            let mid = (midSum / (midEnd - bassEnd) / 255) * (sensitivity / 100);
            let treble = (trebleSum / (len - midEnd) / 255) * (sensitivity / 100) * (trebleBoost / 100);
            
            bass = bass * (1 - smoothing) + (window._lastBass || bass) * smoothing;
            mid = mid * (1 - smoothing) + (window._lastMid || mid) * smoothing;
            treble = treble * (1 - smoothing) + (window._lastTreble || treble) * smoothing;
            
            window._lastBass = bass;
            window._lastMid = mid;
            window._lastTreble = treble;
            
            return { bass, mid, treble };
        }
        
        // === THEMES ===
        Object.entries(themes).forEach(([key, theme]) => {
            const div = document.createElement('div');
            div.className = 'theme-option' + (key === currentTheme ? ' active' : '');
            div.style.background = `linear-gradient(135deg, ${theme.bass}, ${theme.mid}, ${theme.treble})`;
            div.onclick = () => selectTheme(key);
            document.getElementById('themeGrid').appendChild(div);
        });
        
        function selectTheme(theme) {
            currentTheme = theme;
            const t = themes[theme];
            document.documentElement.style.setProperty('--bass', t.bass);
            document.documentElement.style.setProperty('--mid', t.mid);
            document.documentElement.style.setProperty('--treble', t.treble);
            document.querySelectorAll('.theme-option').forEach((el, i) => {
                el.classList.toggle('active', Object.keys(themes)[i] === theme);
            });
        }
        
        // === SETTINGS ===
        function updateSetting(name, value) {
            const display = document.getElementById(name + 'Val');
            display.textContent = value + '%';
            
            switch(name) {
                case 'sensitivity': sensitivity = parseInt(value); break;
                case 'smoothing': 
                    smoothing = parseInt(value) / 100;
                    if (analyser) analyser.smoothingTimeConstant = smoothing;
                    break;
                case 'trebleBoost': trebleBoost = parseInt(value); break;
                case 'speed': speed = parseInt(value) / 100; break;
                case 'intensity': intensity = parseInt(value) / 100; break;
                case 'trail': trailAmount = 1 - (parseInt(value) / 100); break;
            }
        }
        
        function setBackground(bg) {
            currentBg = bg;
            document.querySelectorAll('.bg-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent.toLowerCase() === bg);
            });
        }
        
        function toggleSettings() {
            document.getElementById('settingsPanel').classList.toggle('open');
            document.getElementById('overlayBackdrop').classList.toggle('visible');
        }
        
        function setViz(viz) {
            currentViz = viz;
            document.querySelectorAll('.viz-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent.toLowerCase() === viz);
            });
        }
        
        // === BACKGROUND RENDERERS ===
        
        function drawBackground(bands) {
            switch(currentBg) {
                case 'solid': drawSolidBg(); break;
                case 'inverted': drawInvertedBg(bands); break;
                case 'stars': drawStarsBg(bands); break;
                case 'particles': drawParticlesBg(bands); break;
                case 'nebula': drawNebulaBg(bands); break;
            }
        }
        
        function drawSolidBg() {
            ctx.fillStyle = '#050508';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
        
        function drawInvertedBg(bands) {
            const t = themes[currentTheme];
            // Inverted colors that pulse opposite to audio
            const avg = (bands.bass + bands.mid + bands.treble) / 3;
            const invertStrength = (1 - avg) * 0.15;
            
            const gradient = ctx.createRadialGradient(
                canvas.width/2, canvas.height/2, 0,
                canvas.width/2, canvas.height/2, Math.max(canvas.width, canvas.height) * 0.7
            );
            gradient.addColorStop(0, invertMuted(t.treble, invertStrength));
            gradient.addColorStop(0.5, invertMuted(t.mid, invertStrength * 0.7));
            gradient.addColorStop(1, invertMuted(t.bass, invertStrength * 0.5));
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
        
        function invertMuted(hex, strength) {
            const r = parseInt(hex.slice(1,3), 16);
            const g = parseInt(hex.slice(3,5), 16);
            const b = parseInt(hex.slice(5,7), 16);
            const ir = Math.round(r + (255 - r) * strength);
            const ig = Math.round(g + (255 - g) * strength);
            const ib = Math.round(b + (255 - b) * strength);
            return `rgb(${ir},${ig},${ib})`;
        }
        
        function drawStarsBg(bands) {
            // Deep space background
            const gradient = ctx.createRadialGradient(
                canvas.width/2, canvas.height/2, 0,
                canvas.width/2, canvas.height/2, Math.max(canvas.width, canvas.height)
            );
            gradient.addColorStop(0, '#0a0a15');
            gradient.addColorStop(1, '#050508');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Stars that react to treble
            const twinkleMult = 1 + bands.treble * 2;
            bgStars.forEach(star => {
                const twinkle = Math.sin(time * star.twinkleSpeed * speed) * 0.3 + 0.7;
                const size = star.size * (1 + bands.bass * 0.5);
                ctx.fillStyle = `rgba(255,255,255,${star.alpha * twinkle * twinkleMult * intensity})`;
                ctx.beginPath();
                ctx.arc(star.x, star.y, size, 0, Math.PI * 2);
                ctx.fill();
            });
        }
        
        function drawParticlesBg(bands) {
            // Dark base
            ctx.fillStyle = 'rgba(5, 5, 8, 0.9)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const t = themes[currentTheme];
            const colors = [t.bass, t.mid, t.treble];
            
            bgParticles.forEach((p, i) => {
                // Update position
                p.x += p.vx * (1 + bands.bass);
                p.y += p.vy * (1 + bands.mid);
                
                // Wrap around
                if (p.x < 0) p.x = canvas.width;
                if (p.x > canvas.width) p.x = 0;
                if (p.y < 0) p.y = canvas.height;
                if (p.y > canvas.height) p.y = 0;
                
                // Draw
                const color = colors[i % 3];
                const size = p.size * (1 + bands.treble * 0.5);
                ctx.fillStyle = color;
                ctx.globalAlpha = p.alpha * (0.5 + bands.mid * 0.5);
                ctx.shadowBlur = 10;
                ctx.shadowColor = color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
                ctx.fill();
            });
            
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;
        }
        
        function drawNebulaBg(bands) {
            const t = themes[currentTheme];
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const timeSpeed = time * speed * 0.005;
            
            // Animated nebula clouds
            for (let layer = 0; layer < 3; layer++) {
                const offset = layer * 0.5;
                
                for (let y = 0; y < canvas.height; y += 12) {
                    for (let x = 0; x < canvas.width; x += 12) {
                        const nx = (x - cx) / canvas.width;
                        const ny = (y - cy) / canvas.height;
                        const dist = Math.sqrt(nx*nx + ny*ny);
                        
                        const noise = Math.sin(x * 0.005 + timeSpeed + offset) * 
                                     Math.cos(y * 0.005 + timeSpeed * 0.7 + offset) *
                                     Math.sin(dist * 3 - timeSpeed * 1.5);
                        
                        if (noise > 0.15) {
                            const alpha = (noise - 0.15) * (1 - dist * 0.5) * 0.15 * intensity;
                            ctx.fillStyle = layer % 2 === 0 ? t.bass : t.mid;
                            ctx.globalAlpha = alpha;
                            ctx.fillRect(x, y, 12, 12);
                        }
                    }
                }
            }
            
            // Central glow
            const glowSize = 300 + bands.mid * 200;
            const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, glowSize);
            glow.addColorStop(0, t.mid + '22');
            glow.addColorStop(0.5, t.treble + '11');
            glow.addColorStop(1, 'transparent');
            
            ctx.globalAlpha = 1;
            ctx.fillStyle = glow;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
        
        // === VISUALIZERS ===
        
        // 1. PORTAL
        function drawPortal(bands) {
            const t = themes[currentTheme];
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const maxR = Math.min(canvas.width, canvas.height) * 0.45;
            const timeSpeed = time * speed * 0.015;
            
            const direction = bands.bass > 0.5 ? -1 : 1;
            const twistAmount = bands.mid * 2;
            
            const numHalos = 5;
            for (let i = 0; i < numHalos; i++) {
                const haloR = maxR * (0.8 + i * 0.1);
                const pulse = Math.sin(timeSpeed * 3 * direction + i * 0.5) * bands.bass * 30;
                const radius = haloR + pulse;
                
                ctx.beginPath();
                ctx.arc(cx, cy, radius, 0, Math.PI * 2);
                ctx.strokeStyle = t.bass;
                ctx.globalAlpha = (0.5 - i * 0.07) * intensity;
                ctx.lineWidth = 8 - i * 0.8;
                ctx.shadowBlur = 40;
                ctx.shadowColor = t.bass;
                ctx.stroke();
            }
            
            const arms = 5;
            for (let arm = 0; arm < arms; arm++) {
                const armOffset = (arm / arms) * Math.PI * 2;
                
                ctx.beginPath();
                for (let a = 0; a < Math.PI * 2; a += 0.03) {
                    const spiral = a * (2.5 + twistAmount) + timeSpeed * direction;
                    const r = (a / (Math.PI * 2)) * maxR * (0.2 + bands.mid * 0.8);
                    const wobble = Math.sin(a * 6 + timeSpeed * 4) * 10 * bands.treble;
                    const x = cx + Math.cos(spiral + armOffset) * (r + wobble);
                    const y = cy + Math.sin(spiral + armOffset) * (r + wobble);
                    if (a === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                
                const gradient = ctx.createLinearGradient(cx - maxR, cy - maxR, cx + maxR, cy + maxR);
                gradient.addColorStop(0, t.bass);
                gradient.addColorStop(0.5, t.mid);
                gradient.addColorStop(1, t.treble);
                
                ctx.strokeStyle = gradient;
                ctx.globalAlpha = 0.9 * intensity;
                ctx.lineWidth = 2 + bands.bass * 6;
                ctx.shadowBlur = 30;
                ctx.shadowColor = t.mid;
                ctx.stroke();
            }
            
            const coreSize = 30 + bands.treble * 120;
            const coreGradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, coreSize);
            coreGradient.addColorStop(0, '#ffffff');
            coreGradient.addColorStop(0.2, t.mid);
            coreGradient.addColorStop(0.6, t.treble + 'cc');
            coreGradient.addColorStop(1, t.treble + '00');
            
            ctx.globalAlpha = 1;
            ctx.fillStyle = coreGradient;
            ctx.shadowBlur = 100;
            ctx.shadowColor = t.mid;
            ctx.beginPath();
            ctx.arc(cx, cy, coreSize, 0, Math.PI * 2);
            ctx.fill();
            
            if (bands.treble > 0.05) {
                for (let i = 0; i < Math.floor(bands.treble * 80); i++) {
                    const angle = Math.random() * Math.PI * 2 + timeSpeed * direction * 0.5;
                    const dist = Math.random() * maxR * 0.9;
                    const x = cx + Math.cos(angle) * dist;
                    const y = cy + Math.sin(angle) * dist;
                    const size = Math.random() * 5 + 1;
                    
                    ctx.fillStyle = t.treble;
                    ctx.globalAlpha = Math.random() * 0.9;
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = t.treble;
                    ctx.beginPath();
                    ctx.arc(x, y, size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            
            ctx.shadowBlur = 0;
            ctx.globalAlpha = 1;
        }
        
        // 2. NEBULA
        function drawNebula(bands) {
            const t = themes[currentTheme];
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const timeSpeed = time * speed * 0.01;
            
            for (let layer = 0; layer < 4; layer++) {
                const offset = layer * 0.3;
                
                for (let y = 0; y < canvas.height; y += 8) {
                    for (let x = 0; x < canvas.width; x += 8) {
                        const nx = (x - cx) / canvas.width;
                        const ny = (y - cy) / canvas.height;
                        const dist = Math.sqrt(nx*nx + ny*ny);
                        
                        const noise = Math.sin(x * 0.008 + timeSpeed + offset) * 
                                     Math.cos(y * 0.008 + timeSpeed * 0.7 + offset) *
                                     Math.sin(dist * 4 - timeSpeed * 2);
                        
                        if (noise > 0.2) {
                            const alpha = (noise - 0.2) * (1 - dist) * 0.25 * intensity;
                            ctx.fillStyle = layer % 2 === 0 ? t.bass : t.mid;
                            ctx.globalAlpha = alpha;
                            ctx.fillRect(x, y, 8, 8);
                        }
                    }
                }
            }
            
            const glowSize = 200 + bands.mid * 300;
            const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, glowSize);
            glow.addColorStop(0, t.mid + '44');
            glow.addColorStop(0.5, t.treble + '22');
            glow.addColorStop(1, t.bass + '00');
            
            ctx.globalAlpha = 1;
            ctx.fillStyle = glow;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            for (let i = 0; i < Math.floor(bands.bass * 30); i++) {
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.random() * Math.min(canvas.width, canvas.height) * 0.4;
                const x = cx + Math.cos(angle + timeSpeed) * dist;
                const y = cy + Math.sin(angle + timeSpeed) * dist;
                
                ctx.fillStyle = Math.random() > 0.5 ? t.bass : t.treble;
                ctx.globalAlpha = 0.7;
                ctx.shadowBlur = 15;
                ctx.shadowColor = t.mid;
                ctx.beginPath();
                ctx.arc(x, y, (Math.random() * 4 + 2) * intensity, 0, Math.PI * 2);
                ctx.fill();
            }
            
            ctx.shadowBlur = 0;
            ctx.globalAlpha = 1;
        }
        
        // 3. RINGS
        function drawRings(bands) {
            const t = themes[currentTheme];
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const maxR = Math.min(canvas.width, canvas.height) * 0.42;
            const timeSpeed = time * speed * 0.02;
            
            const numRings = 6;
            for (let i = 0; i < numRings; i++) {
                const phase = ((timeSpeed * 0.8 + i * 0.8) % 2.5) / 2.5;
                const radius = phase * maxR;
                const alpha = (1 - phase) * 0.7;
                
                ctx.beginPath();
                ctx.arc(cx, cy, radius, 0, Math.PI * 2);
                ctx.strokeStyle = t.bass;
                ctx.globalAlpha = alpha * intensity;
                ctx.lineWidth = 2 + bands.bass * 6;
                ctx.shadowBlur = 25;
                ctx.shadowColor = t.bass;
                ctx.stroke();
                
                const midRadius = radius * 0.75;
                if (midRadius > 10) {
                    ctx.beginPath();
                    ctx.arc(cx, cy, midRadius, 0, Math.PI * 2);
                    ctx.strokeStyle = t.mid;
                    ctx.globalAlpha = alpha * 0.6 * intensity;
                    ctx.lineWidth = 1.5 + bands.mid * 4;
                    ctx.shadowColor = t.mid;
                    ctx.stroke();
                }
            }
            
            const orbSize = 15 + bands.treble * 60;
            const orb = ctx.createRadialGradient(cx, cy, 0, cx, cy, orbSize);
            orb.addColorStop(0, t.mid);
            orb.addColorStop(0.5, t.treble + '88');
            orb.addColorStop(1, t.treble + '00');
            
            ctx.globalAlpha = 1;
            ctx.fillStyle = orb;
            ctx.shadowBlur = 40;
            ctx.shadowColor = t.mid;
            ctx.beginPath();
            ctx.arc(cx, cy, orbSize, 0, Math.PI * 2);
            ctx.fill();
            
            for (let i = 0; i < Math.floor(bands.treble * 40); i++) {
                const angle = Math.random() * Math.PI * 2;
                const dist = 30 + Math.random() * 80;
                const x = cx + Math.cos(angle) * dist;
                const y = cy + Math.sin(angle) * dist;
                
                ctx.fillStyle = t.treble;
                ctx.globalAlpha = 0.6 + Math.random() * 0.4;
                ctx.shadowBlur = 8;
                ctx.beginPath();
                ctx.arc(x, y, 1 + Math.random() * 2, 0, Math.PI * 2);
                ctx.fill();
            }
            
            ctx.shadowBlur = 0;
            ctx.globalAlpha = 1;
        }
        
        // 4. PULSES
        function drawPulses(bands) {
            const t = themes[currentTheme];
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const maxR = Math.min(canvas.width, canvas.height) * 0.45;
            const timeSpeed = time * speed * 0.03;
            
            const numRings = 8;
            for (let i = 0; i < numRings; i++) {
                const phase = ((timeSpeed + i * 0.5) % 3) / 3;
                const radius = phase * maxR;
                const alpha = (1 - phase) * 0.6;
                
                ctx.beginPath();
                ctx.arc(cx, cy, radius, 0, Math.PI * 2);
                ctx.strokeStyle = i % 2 === 0 ? t.bass : t.mid;
                ctx.globalAlpha = alpha * intensity;
                ctx.lineWidth = 2 + bands.bass * 8 + bands.mid * 4;
                ctx.shadowBlur = 25;
                ctx.shadowColor = i % 2 === 0 ? t.bass : t.mid;
                ctx.stroke();
                
                if (phase < 0.6) {
                    ctx.beginPath();
                    ctx.arc(cx, cy, radius * 0.6, 0, Math.PI * 2);
                    ctx.strokeStyle = t.treble;
                    ctx.globalAlpha = alpha * 0.4 * intensity;
                    ctx.lineWidth = (2 + bands.bass * 8 + bands.mid * 4) * 0.4;
                    ctx.stroke();
                }
            }
            
            if (bands.bass > 0.4) {
                const burstSize = 40 + bands.bass * 120;
                const burst = ctx.createRadialGradient(cx, cy, 0, cx, cy, burstSize);
                burst.addColorStop(0, t.mid + 'cc');
                burst.addColorStop(0.5, t.treble + '44');
                burst.addColorStop(1, t.bass + '00');
                
                ctx.globalAlpha = 1;
                ctx.fillStyle = burst;
                ctx.shadowBlur = 50;
                ctx.shadowColor = t.mid;
                ctx.beginPath();
                ctx.arc(cx, cy, burstSize, 0, Math.PI * 2);
                ctx.fill();
            }
            
            ctx.shadowBlur = 0;
            ctx.globalAlpha = 1;
        }
        
        // 5. WAVES
        function drawWaves(bands) {
            const t = themes[currentTheme];
            const timeSpeed = time * speed * 0.025;
            
            const layers = [
                { freq: bands.bass, color: t.bass, y: 0.35, amp: 60, speed: 1.5, lw: 2 },
                { freq: bands.mid, color: t.mid, y: 0.5, amp: 50, speed: 2.2, lw: 2 },
                { freq: bands.treble, color: t.treble, y: 0.65, amp: 35, speed: 3.5, lw: 1.5 }
            ];
            
            layers.forEach(layer => {
                ctx.beginPath();
                
                for (let x = 0; x <= canvas.width; x += 4) {
                    const wave1 = Math.sin(x * 0.01 + timeSpeed * layer.speed) * layer.amp * (0.3 + layer.freq * 0.7);
                    const wave2 = Math.sin(x * 0.018 + timeSpeed * layer.speed * 1.3) * layer.amp * 0.4 * bands.mid;
                    const y = canvas.height * layer.y + wave1 + wave2;
                    
                    if (x === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                
                ctx.strokeStyle = layer.color;
                ctx.lineWidth = layer.lw + layer.freq * 5;
                ctx.globalAlpha = 0.8 * intensity;
                ctx.shadowBlur = 15;
                ctx.shadowColor = layer.color;
                ctx.stroke();
            });
            
            ctx.shadowBlur = 0;
            ctx.globalAlpha = 1;
        }
        
        // 6. SHARDS
        function drawShards(bands) {
            const t = themes[currentTheme];
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const timeSpeed = time * speed * 0.012;
            
            const numShards = 16;
            for (let i = 0; i < numShards; i++) {
                const angle = (i / numShards) * Math.PI * 2 + timeSpeed;
                
                const baseWidth = 10 + bands.bass * 15;
                const tipWidth = 3 + bands.mid * 5;
                const length = 120 + Math.sin(timeSpeed * 3 + i * 0.5) * 50 + bands.bass * 200;
                
                const perpAngle = angle + Math.PI / 2;
                const bx = cx + Math.cos(angle) * 30;
                const by = cy + Math.sin(angle) * 30;
                const tx = cx + Math.cos(angle) * (30 + length);
                const ty = cy + Math.sin(angle) * (30 + length);
                
                const px1 = Math.cos(perpAngle) * baseWidth;
                const py1 = Math.sin(perpAngle) * baseWidth;
                const px2 = Math.cos(perpAngle) * tipWidth;
                const py2 = Math.sin(perpAngle) * tipWidth;
                
                ctx.beginPath();
                ctx.moveTo(bx + px1, by + py1);
                ctx.lineTo(tx + px2, ty + py2);
                ctx.lineTo(tx - px2, ty - py2);
                ctx.lineTo(bx - px1, by - py1);
                ctx.closePath();
                
                const gradient = ctx.createLinearGradient(bx, by, tx, ty);
                gradient.addColorStop(0, t.bass);
                gradient.addColorStop(0.6, t.mid);
                gradient.addColorStop(1, t.treble);
                
                ctx.fillStyle = gradient;
                ctx.globalAlpha = 0.8 * intensity;
                ctx.shadowBlur = 20;
                ctx.shadowColor = t.mid;
                ctx.fill();
            }
            
            const orbSize = 35 + bands.treble * 70;
            const orb = ctx.createRadialGradient(cx, cy, 0, cx, cy, orbSize);
            orb.addColorStop(0, '#ffffff');
            orb.addColorStop(0.2, t.mid);
            orb.addColorStop(0.8, t.treble + 'aa');
            orb.addColorStop(1, t.treble + '00');
            
            ctx.globalAlpha = 1;
            ctx.fillStyle = orb;
            ctx.shadowBlur = 60;
            ctx.shadowColor = t.mid;
            ctx.beginPath();
            ctx.arc(cx, cy, orbSize, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.shadowBlur = 0;
        }
        
        // 7. KALEIDOSCOPE
        function drawKaleido(bands) {
            const t = themes[currentTheme];
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const timeSpeed = time * speed * 0.018;
            
            const layers = [
                { segments: 6, scale: 1.8, rotOffset: 0, speedMult: 1 },
                { segments: 8, scale: 1.4, rotOffset: Math.PI/8, speedMult: -0.7 },
                { segments: 12, scale: 1.0, rotOffset: Math.PI/12, speedMult: 0.5 },
                { segments: 16, scale: 0.7, rotOffset: 0, speedMult: -0.3 }
            ];
            
            layers.forEach((layer, layerIdx) => {
                const segments = layer.segments;
                const maxR = Math.min(canvas.width, canvas.height) * 0.35 * layer.scale;
                const rot = timeSpeed * layer.speedMult + layer.rotOffset;
                
                for (let seg = 0; seg < segments; seg++) {
                    const angle = (seg / segments) * Math.PI * 2 + rot;
                    
                    ctx.save();
                    ctx.translate(cx, cy);
                    ctx.rotate(angle);
                    
                    ctx.beginPath();
                    ctx.moveTo(maxR * 0.3, 0);
                    ctx.quadraticCurveTo(maxR * 0.6, -maxR * 0.15 * (1 + bands.bass), maxR, 0);
                    ctx.quadraticCurveTo(maxR * 0.6, maxR * 0.15 * (1 + bands.mid), maxR * 0.3, 0);
                    
                    const colors = [t.bass, t.mid, t.treble];
                    const colorIdx = (seg + layerIdx) % 3;
                    ctx.fillStyle = colors[colorIdx];
                    ctx.globalAlpha = (0.5 - layerIdx * 0.08) * intensity;
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = colors[colorIdx];
                    ctx.fill();
                    
                    if (layerIdx === 2) {
                        ctx.beginPath();
                        ctx.arc(maxR * 0.5, 0, maxR * 0.12 + bands.treble * 10, 0, Math.PI * 2);
                        ctx.fillStyle = '#ffffff';
                        ctx.globalAlpha = 0.3 + bands.treble * 0.3;
                        ctx.fill();
                    }
                    
                    ctx.restore();
                }
            });
            
            const eyeSize = 25 + bands.treble * 40;
            
            ctx.beginPath();
            ctx.arc(cx, cy, eyeSize * 1.5, 0, Math.PI * 2);
            ctx.strokeStyle = t.bass;
            ctx.globalAlpha = 0.5 * intensity;
            ctx.lineWidth = 3;
            ctx.shadowBlur = 20;
            ctx.shadowColor = t.bass;
            ctx.stroke();
            
            ctx.beginPath();
            ctx.arc(cx, cy, eyeSize, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff';
            ctx.globalAlpha = 0.9;
            ctx.shadowBlur = 30;
            ctx.shadowColor = t.mid;
            ctx.fill();
            
            const pupilSize = eyeSize * (0.3 + bands.bass * 0.3);
            const pupil = ctx.createRadialGradient(cx, cy, 0, cx, cy, pupilSize);
            pupil.addColorStop(0, '#000000');
            pupil.addColorStop(0.7, t.treble);
            pupil.addColorStop(1, t.treble + '00');
            ctx.fillStyle = pupil;
            ctx.globalAlpha = 1;
            ctx.beginPath();
            ctx.arc(cx, cy, pupilSize, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.beginPath();
            ctx.arc(cx - eyeSize * 0.25, cy - eyeSize * 0.25, eyeSize * 0.15, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff';
            ctx.globalAlpha = 0.8;
            ctx.fill();
            
            ctx.shadowBlur = 0;
            ctx.globalAlpha = 1;
        }
        
        // 8. TUNNEL
        function drawTunnel(bands) {
            const t = themes[currentTheme];
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const timeSpeed = time * speed * 0.035;
            
            const bgGlow = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.min(canvas.width, canvas.height) * 0.5);
            bgGlow.addColorStop(0, t.mid + '22');
            bgGlow.addColorStop(0.5, t.treble + '11');
            bgGlow.addColorStop(1, t.bass + '00');
            ctx.fillStyle = bgGlow;
            ctx.globalAlpha = 1;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const numRings = 30;
            for (let i = 0; i < numRings; i++) {
                const z = i / numRings;
                const depth = 1 - z;
                const baseRadius = 30 + z * Math.min(canvas.width, canvas.height) * 0.5;
                
                const bassPulse = 1 + bands.bass * 0.4 * depth;
                const midPulse = 1 + bands.mid * 0.2 * (1 - z * 0.5);
                const radius = baseRadius * bassPulse * midPulse;
                
                const isHighlight = (i % 3 === 0 && bands.treble > 0.2);
                const color = i % 2 === 0 ? t.bass : (isHighlight ? t.treble : t.mid);
                
                ctx.beginPath();
                ctx.arc(cx, cy, radius, 0, Math.PI * 2);
                ctx.strokeStyle = color;
                ctx.globalAlpha = z * 0.8 * intensity;
                ctx.lineWidth = (1 + bands.bass * 5) * depth;
                ctx.shadowBlur = isHighlight ? 20 : 10;
                ctx.shadowColor = color;
                ctx.stroke();
                
                if (i % 4 === 0 && depth > 0.3) {
                    const innerR = radius * 0.7;
                    for (let a = 0; a < 8; a++) {
                        const angle = (a / 8) * Math.PI * 2 + timeSpeed;
                        ctx.beginPath();
                        ctx.moveTo(cx + Math.cos(angle) * innerR * 0.3, cy + Math.sin(angle) * innerR * 0.3);
                        ctx.lineTo(cx + Math.cos(angle) * innerR, cy + Math.sin(angle) * innerR);
                        ctx.strokeStyle = t.mid;
                        ctx.globalAlpha = z * 0.3 * intensity;
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }
                }
            }
            
            const vortexSize = 40 + bands.bass * 80;
            for (let ring = 0; ring < 4; ring++) {
                const r = vortexSize * (0.3 + ring * 0.25);
                ctx.beginPath();
                ctx.arc(cx, cy, r, 0, Math.PI * 2);
                ctx.strokeStyle = ring % 2 === 0 ? t.mid : t.treble;
                ctx.globalAlpha = (0.8 - ring * 0.15) * intensity;
                ctx.lineWidth = 2 + bands.treble * 4;
                ctx.shadowBlur = 25;
                ctx.shadowColor = t.mid;
                ctx.stroke();
            }
            
            const centerSize = 20 + bands.treble * 50;
            const center = ctx.createRadialGradient(cx, cy, 0, cx, cy, centerSize);
            center.addColorStop(0, '#ffffff');
            center.addColorStop(0.3, t.mid);
            center.addColorStop(1, t.treble + '00');
            
            ctx.globalAlpha = 1;
            ctx.fillStyle = center;
            ctx.shadowBlur = 50;
            ctx.shadowColor = t.mid;
            ctx.beginPath();
            ctx.arc(cx, cy, centerSize, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.shadowBlur = 0;
            ctx.globalAlpha = 1;
        }
        
        // 9. TERRAIN
        function drawTerrain(bands) {
            const t = themes[currentTheme];
            const timeSpeed = time * speed * 0.015;
            
            for (let layer = 0; layer < 3; layer++) {
                const yBase = canvas.height * (0.5 + layer * 0.12);
                const amp = 80 - layer * 15;
                const yOffset = layer * 30;
                
                ctx.beginPath();
                ctx.moveTo(0, canvas.height);
                
                for (let x = 0; x <= canvas.width; x += 3) {
                    const noise1 = Math.sin(x * 0.008 + timeSpeed * (1 + layer * 0.3)) * amp * (0.3 + bands.bass * 0.7);
                    const noise2 = Math.sin(x * 0.015 + timeSpeed * 1.5) * amp * 0.4 * (0.3 + bands.mid * 0.7);
                    const noise3 = Math.sin(x * 0.003 + timeSpeed * 0.5) * amp * 0.3;
                    const y = yBase - Math.abs(noise1 + noise2 + noise3) - yOffset;
                    ctx.lineTo(x, y);
                }
                
                ctx.lineTo(canvas.width, canvas.height);
                ctx.closePath();
                
                const colors = [t.treble, t.mid, t.bass];
                const gradient = ctx.createLinearGradient(0, yBase - amp, 0, canvas.height);
                gradient.addColorStop(0, colors[layer]);
                gradient.addColorStop(1, colors[layer] + '44');
                
                ctx.fillStyle = gradient;
                ctx.globalAlpha = (0.8 - layer * 0.15) * intensity;
                ctx.shadowBlur = 20;
                ctx.shadowColor = colors[layer];
                ctx.fill();
            }
            
            ctx.shadowBlur = 0;
            ctx.globalAlpha = 1;
        }
        
        // 10. FIRE
        function drawFire(bands) {
            const t = themes[currentTheme];
            const timeSpeed = time * speed * 0.03;
            const bottomY = canvas.height;
            const maxFlameHeight = canvas.height * 0.85 * (0.2 + bands.bass * 0.8);
            
            for (let x = 0; x < canvas.width; x += 3) {
                const flicker = Math.sin(x * 0.05 + timeSpeed * 10) * 20 * bands.treble;
                const wave = Math.sin(x * 0.015 + timeSpeed * 4) * 40 * bands.mid;
                const wave2 = Math.sin(x * 0.03 + timeSpeed * 6) * 15 * bands.bass;
                const height = maxFlameHeight + wave + wave2 + flicker;
                
                const gradient = ctx.createLinearGradient(0, bottomY, 0, bottomY - height);
                gradient.addColorStop(0, t.bass);
                gradient.addColorStop(0.2, t.bass + 'cc');
                gradient.addColorStop(0.4, t.mid);
                gradient.addColorStop(0.7, t.treble + 'aa');
                gradient.addColorStop(1, t.treble + '00');
                
                ctx.fillStyle = gradient;
                ctx.globalAlpha = 0.9 * intensity;
                ctx.shadowBlur = 20;
                ctx.shadowColor = t.mid;
                ctx.fillRect(x, bottomY - height, 4, height);
            }
            
            if (bands.treble > 0.15) {
                for (let i = 0; i < Math.floor(bands.treble * 30); i++) {
                    const x = Math.random() * canvas.width;
                    const y = bottomY - Math.random() * maxFlameHeight * 0.9;
                    const size = Math.random() * 4 + 1;
                    
                    ctx.fillStyle = t.treble;
                    ctx.globalAlpha = Math.random() * 0.8;
                    ctx.shadowBlur = 10;
                    ctx.beginPath();
                    ctx.arc(x, y, size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            
            ctx.shadowBlur = 0;
            ctx.globalAlpha = 1;
        }
        
        // 11. MUSHROOM
        function drawMushroom(bands) {
            const t = themes[currentTheme];
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const timeSpeed = time * speed * 0.02;
            
            const numArms = 6;
            for (let arm = 0; arm < numArms; arm++) {
                const armAngle = (arm / numArms) * Math.PI * 2 + timeSpeed;
                
                ctx.beginPath();
                for (let r = 0; r < Math.min(canvas.width, canvas.height) * 0.45; r += 3) {
                    const spiralAngle = armAngle + r * 0.015 * (1 + bands.bass);
                    const spiralR = r * (0.5 + bands.mid * 0.5);
                    const wobble = Math.sin(r * 0.05 + timeSpeed * 3) * 15 * bands.treble;
                    
                    const x = cx + Math.cos(spiralAngle) * spiralR + wobble;
                    const y = cy + Math.sin(spiralAngle) * spiralR + wobble;
                    
                    const size = (2 + r * 0.02) * intensity;
                    const alpha = (1 - r / (Math.min(canvas.width, canvas.height) * 0.45)) * 0.8;
                    
                    ctx.fillStyle = arm % 2 === 0 ? t.bass : t.mid;
                    ctx.globalAlpha = alpha * intensity;
                    ctx.beginPath();
                    ctx.arc(x, y, size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            
            const capSize = 60 + bands.bass * 100;
            const cap = ctx.createRadialGradient(cx, cy - 20, 0, cx, cy, capSize);
            cap.addColorStop(0, t.treble);
            cap.addColorStop(0.5, t.mid + 'cc');
            cap.addColorStop(1, t.bass + '00');
            
            ctx.globalAlpha = 0.8 * intensity;
            ctx.fillStyle = cap;
            ctx.shadowBlur = 40;
            ctx.shadowColor = t.mid;
            ctx.beginPath();
            ctx.ellipse(cx, cy, capSize, capSize * 0.6, 0, 0, Math.PI * 2);
            ctx.fill();
            
            for (let i = 0; i < 12; i++) {
                const angle = (i / 12) * Math.PI * 2 + timeSpeed;
                const dist = capSize * 0.5 * (0.3 + Math.random() * 0.5);
                const x = cx + Math.cos(angle) * dist;
                const y = cy + Math.sin(angle) * dist * 0.6;
                const size = 5 + Math.random() * 10;
                
                ctx.fillStyle = '#ffffff88';
                ctx.globalAlpha = 0.5 * intensity;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }
            
            ctx.globalAlpha = 0.9 * intensity;
            ctx.fillStyle = t.treble;
            ctx.shadowBlur = 30;
            ctx.beginPath();
            ctx.moveTo(cx - 15, cy);
            ctx.quadraticCurveTo(cx - 20, cy + 80, cx - 10, cy + 120);
            ctx.lineTo(cx + 10, cy + 120);
            ctx.quadraticCurveTo(cx + 20, cy + 80, cx + 15, cy);
            ctx.fill();
            
            ctx.shadowBlur = 0;
            ctx.globalAlpha = 1;
        }
        
        // 12. SACRED
        function drawSacred(bands) {
            const t = themes[currentTheme];
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const timeSpeed = time * speed * 0.01;
            const baseR = 50 + bands.bass * 80;
            
            const flowerRadius = baseR * (1 + bands.mid * 0.5);
            
            ctx.beginPath();
            ctx.arc(cx, cy, flowerRadius, 0, Math.PI * 2);
            ctx.strokeStyle = t.mid;
            ctx.globalAlpha = 0.6 * intensity;
            ctx.lineWidth = 2 + bands.bass * 4;
            ctx.shadowBlur = 20;
            ctx.shadowColor = t.mid;
            ctx.stroke();
            
            for (let i = 0; i < 6; i++) {
                const angle = (i / 6) * Math.PI * 2 + timeSpeed;
                const x = cx + Math.cos(angle) * flowerRadius;
                const y = cy + Math.sin(angle) * flowerRadius;
                
                ctx.beginPath();
                ctx.arc(x, y, flowerRadius, 0, Math.PI * 2);
                ctx.strokeStyle = i % 2 === 0 ? t.bass : t.treble;
                ctx.globalAlpha = (0.5 - i * 0.05) * intensity;
                ctx.lineWidth = 2 + bands.treble * 3;
                ctx.stroke();
            }
            
            const innerR = flowerRadius * 0.866;
            const points = [];
            for (let i = 0; i < 6; i++) {
                const angle = (i / 6) * Math.PI * 2 + timeSpeed * 0.5;
                points.push({
                    x: cx + Math.cos(angle) * innerR,
                    y: cy + Math.sin(angle) * innerR
                });
            }
            
            ctx.globalAlpha = 0.5 * intensity;
            for (let i = 0; i < 6; i++) {
                for (let j = i + 1; j < 6; j++) {
                    if (j === i + 3) continue;
                    ctx.beginPath();
                    ctx.moveTo(points[i].x, points[i].y);
                    ctx.lineTo(points[j].x, points[j].y);
                    ctx.strokeStyle = t.treble;
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
            }
            
            const eyeSize = 20 + bands.treble * 30;
            ctx.beginPath();
            ctx.arc(cx, cy, eyeSize, 0, Math.PI * 2);
            ctx.fillStyle = t.mid;
            ctx.globalAlpha = 0.9 * intensity;
            ctx.fill();
            
            ctx.beginPath();
            ctx.arc(cx, cy, eyeSize * 0.5, 0, Math.PI * 2);
            ctx.fillStyle = '#000';
            ctx.fill();
            
            ctx.shadowBlur = 0;
            ctx.globalAlpha = 1;
        }
        
        // 13. LYSERGIC
        function drawLysergic(bands) {
            const t = themes[currentTheme];
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const timeSpeed = time * speed * 0.025;
            
            function drawFractal(x, y, size, depth, angle) {
                if (depth <= 0 || size < 5) return;
                
                const newSize = size * 0.5;
                const colors = [t.bass, t.mid, t.treble];
                
                for (let i = 0; i < 4; i++) {
                    const a = angle + (i / 4) * Math.PI * 2 + timeSpeed * (depth * 0.2);
                    const nx = x + Math.cos(a) * size * 0.8;
                    const ny = y + Math.sin(a) * size * 0.8;
                    
                    ctx.beginPath();
                    ctx.arc(nx, ny, size * (0.3 + bands.bass * 0.3), 0, Math.PI * 2);
                    ctx.fillStyle = colors[(depth + i) % 3];
                    ctx.globalAlpha = (depth / 6) * 0.7 * intensity;
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = colors[(depth + i) % 3];
                    ctx.fill();
                    
                    drawFractal(nx, ny, newSize, depth - 1, a);
                }
            }
            
            drawFractal(cx, cy, 80 + bands.mid * 60, 5, timeSpeed);
            
            const glowSize = 40 + bands.treble * 80;
            const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, glowSize);
            glow.addColorStop(0, '#ffffff');
            glow.addColorStop(0.3, t.mid + 'aa');
            glow.addColorStop(1, t.treble + '00');
            
            ctx.globalAlpha = 1;
            ctx.fillStyle = glow;
            ctx.shadowBlur = 50;
            ctx.shadowColor = t.mid;
            ctx.beginPath();
            ctx.arc(cx, cy, glowSize, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.shadowBlur = 0;
        }
        
        // 14. TOOL
        function drawTool(bands) {
            const t = themes[currentTheme];
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const timeSpeed = time * speed * 0.012;
            
            const numLayers = 5;
            for (let layer = 0; layer < numLayers; layer++) {
                const layerY = cy - (layer - numLayers/2) * (80 + bands.bass * 40);
                const layerW = 50 + layer * 60 + bands.mid * 100;
                const layerH = 40 + layer * 30;
                
                ctx.beginPath();
                ctx.moveTo(cx, layerY - layerH);
                ctx.lineTo(cx + layerW, layerY);
                ctx.lineTo(cx, layerY + layerH);
                ctx.lineTo(cx - layerW, layerY);
                ctx.closePath();
                
                const colors = [t.bass, t.mid, t.treble, t.bass, t.mid];
                ctx.fillStyle = colors[layer];
                ctx.globalAlpha = (0.9 - layer * 0.1) * intensity;
                ctx.shadowBlur = 25;
                ctx.shadowColor = colors[layer];
                ctx.fill();
                
                ctx.strokeStyle = '#ffffff44';
                ctx.lineWidth = 1;
                ctx.stroke();
            }
            
            const numTri = 3;
            for (let i = 0; i < numTri; i++) {
                const angle = (i / numTri) * Math.PI * 2 + timeSpeed * 2;
                const dist = 150 + Math.sin(timeSpeed * 4 + i) * 30 + bands.treble * 50;
                
                ctx.save();
                ctx.translate(cx + Math.cos(angle) * dist, cy + Math.sin(angle) * dist);
                ctx.rotate(angle + timeSpeed);
                
                const triSize = 30 + bands.bass * 20;
                ctx.beginPath();
                ctx.moveTo(0, -triSize);
                ctx.lineTo(triSize * 0.866, triSize * 0.5);
                ctx.lineTo(-triSize * 0.866, triSize * 0.5);
                ctx.closePath();
                
                ctx.fillStyle = i % 2 === 0 ? t.treble : t.mid;
                ctx.globalAlpha = 0.8 * intensity;
                ctx.shadowBlur = 20;
                ctx.shadowColor = ctx.fillStyle;
                ctx.fill();
                
                ctx.restore();
            }
            
            const emblemSize = 25 + bands.treble * 40;
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                const angle = (i / 6) * Math.PI * 2 - Math.PI/2;
                const x = cx + Math.cos(angle) * emblemSize;
                const y = cy + Math.sin(angle) * emblemSize;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.fillStyle = '#ffffff';
            ctx.globalAlpha = 0.9 * intensity;
            ctx.shadowBlur = 30;
            ctx.shadowColor = t.mid;
            ctx.fill();
            
            ctx.shadowBlur = 0;
            ctx.globalAlpha = 1;
        }
        
        // 15. COSMIC - New deep space design
        function drawCosmic(bands) {
            const t = themes[currentTheme];
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const timeSpeed = time * speed * 0.008;
            
            // Multiple orbiting cosmic bodies
            const numBodies = 5;
            for (let i = 0; i < numBodies; i++) {
                const orbitR = 80 + i * 60 + bands.bass * 40;
                const angle = timeSpeed * (1 + i * 0.2) + (i / numBodies) * Math.PI * 2;
                const size = 15 + i * 8 + bands.treble * 20;
                
                const x = cx + Math.cos(angle) * orbitR;
                const y = cy + Math.sin(angle) * orbitR;
                
                // Planet body
                const bodyGrad = ctx.createRadialGradient(x - size * 0.3, y - size * 0.3, 0, x, y, size);
                const colors = [t.bass, t.mid, t.treble];
                bodyGrad.addColorStop(0, '#ffffff');
                bodyGrad.addColorStop(0.3, colors[i % 3]);
                bodyGrad.addColorStop(1, colors[(i + 1) % 3] + '00');
                
                ctx.globalAlpha = (0.9 - i * 0.1) * intensity;
                ctx.fillStyle = bodyGrad;
                ctx.shadowBlur = 30;
                ctx.shadowColor = colors[i % 3];
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
                
                // Ring around planet
                if (i % 2 === 0) {
                    ctx.beginPath();
                    ctx.ellipse(x, y, size * 1.8, size * 0.4, angle, 0, Math.PI * 2);
                    ctx.strokeStyle = colors[(i + 1) % 3];
                    ctx.globalAlpha = 0.5 * intensity;
                    ctx.lineWidth = 3 + bands.mid * 3;
                    ctx.stroke();
                }
            }
            
            // Central sun/star
            const sunSize = 40 + bands.bass * 60;
            const sunGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, sunSize);
            sunGrad.addColorStop(0, '#ffffff');
            sunGrad.addColorStop(0.2, t.mid);
            sunGrad.addColorStop(0.6, t.treble);
            sunGrad.addColorStop(1, t.bass + '00');
            
            ctx.globalAlpha = 1;
            ctx.fillStyle = sunGrad;
            ctx.shadowBlur = 80;
            ctx.shadowColor = t.mid;
            ctx.beginPath();
            ctx.arc(cx, cy, sunSize, 0, Math.PI * 2);
            ctx.fill();
            
            // Corona rays
            for (let i = 0; i < 12; i++) {
                const rayAngle = (i / 12) * Math.PI * 2 + timeSpeed * 0.5;
                const rayLen = sunSize * (1.5 + bands.mid * 0.5);
                
                ctx.beginPath();
                ctx.moveTo(cx + Math.cos(rayAngle) * sunSize, cy + Math.sin(rayAngle) * sunSize);
                ctx.lineTo(cx + Math.cos(rayAngle) * rayLen, cy + Math.sin(rayAngle) * rayLen);
                ctx.strokeStyle = t.treble;
                ctx.globalAlpha = 0.4 * intensity;
                ctx.lineWidth = 2 + bands.bass * 4;
                ctx.shadowBlur = 15;
                ctx.stroke();
            }
            
            ctx.shadowBlur = 0;
            ctx.globalAlpha = 1;
        }
        
        // === MAIN LOOP ===
        function animate() {
            if (!isStarted) return;
            requestAnimationFrame(animate);
            
            time++;
            
            // Clear with trail effect
            ctx.fillStyle = `rgba(5, 5, 8, ${trailAmount})`;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            if (!analyser) return;
            
            const bands = getBands();
            
            // Draw background effect first
            drawBackground(bands);
            
            // Draw visualizer on top
            switch (currentViz) {
                case 'portal': drawPortal(bands); break;
                case 'nebula': drawNebula(bands); break;
                case 'rings': drawRings(bands); break;
                case 'pulses': drawPulses(bands); break;
                case 'waves': drawWaves(bands); break;
                case 'shards': drawShards(bands); break;
                case 'kaleido': drawKaleido(bands); break;
                case 'tunnel': drawTunnel(bands); break;
                case 'terrain': drawTerrain(bands); break;
                case 'fire': drawFire(bands); break;
                case 'mushroom': drawMushroom(bands); break;
                case 'sacred': drawSacred(bands); break;
                case 'lysergic': drawLysergic(bands); break;
                case 'tool': drawTool(bands); break;
                case 'cosmic': drawCosmic(bands); break;
            }
            
            // Update bars
            document.getElementById('bassBar').style.width = (bands.bass * 100) + '%';
            document.getElementById('midBar').style.width = (bands.mid * 100) + '%';
            document.getElementById('trebleBar').style.width = (bands.treble * 100) + '%';
        }
        
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') toggleSettings();
            if (e.key === 's' || e.key === 'S') toggleSettings();
        });
    </script>
</body>
</html>
