<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mic Test</title>
    <style>
        body { font-family: sans-serif; background: #111; color: #fff; padding: 40px; text-align: center; }
        button { padding: 20px 40px; font-size: 20px; background: #00ff00; border: none; border-radius: 10px; cursor: pointer; }
        button:hover { background: #00cc00; }
        button:disabled { background: #666; cursor: not-allowed; }
        #status { margin: 20px; padding: 20px; background: #222; border-radius: 10px; }
        .error { color: #ff6666; }
        .success { color: #66ff66; }
    </style>
</head>
<body>
    <h1>Microphone Test</h1>
    <p>This is a minimal test to verify microphone access works.</p>
    
    <button id="micBtn" onclick="requestMic()">Connect Microphone</button>
    
    <div id="status">Click the button to request microphone access.</div>
    
    <div id="debug" style="margin-top:30px; text-align:left; background:#000; padding:20px; font-family:monospace; font-size:12px; max-height:300px; overflow:auto;">
        <strong>Debug Log:</strong><br>
    </div>

    <script>
        const status = document.getElementById('status');
        const debug = document.getElementById('debug');
        const btn = document.getElementById('micBtn');
        
        function log(msg) {
            const time = new Date().toLocaleTimeString();
            debug.innerHTML += `[${time}] ${msg}<br>`;
            debug.scrollTop = debug.scrollHeight;
            console.log(msg);
        }
        
        function updateStatus(msg, type) {
            status.textContent = msg;
            status.className = type;
        }
        
        async function requestMic() {
            log('Button clicked!');
            btn.disabled = true;
            btn.textContent = 'Requesting...';
            updateStatus('Requesting microphone access...', '');
            
            log('Checking navigator.mediaDevices...');
            log('navigator.mediaDevices exists: ' + !!navigator.mediaDevices);
            log('navigator.mediaDevices.getUserMedia exists: ' + !!navigator.mediaDevices?.getUserMedia);
            
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                log('ERROR: getUserMedia not supported');
                updateStatus('Error: Your browser does not support microphone access', 'error');
                btn.textContent = 'Not Supported';
                return;
            }
            
            try {
                log('Calling getUserMedia...');
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                log('SUCCESS! Got stream: ' + stream.id);
                updateStatus('🎉 Microphone connected! Stream ID: ' + stream.id, 'success');
                btn.textContent = 'Connected!';
                
                // Show audio levels
                const audioCtx = new AudioContext();
                const source = audioCtx.createMediaStreamSource(stream);
                const analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256;
                source.connect(analyser);
                
                const dataArray = new Uint8Array(analyser.frequencyBinCount);
                
                function draw() {
                    analyser.getByteFrequencyData(dataArray);
                    const avg = dataArray.reduce((a,b) => a+b) / dataArray.length;
                    status.textContent = '🎤 Listening... Audio level: ' + Math.round(avg);
                    requestAnimationFrame(draw);
                }
                draw();
                
            } catch (err) {
                log('ERROR: ' + err.name + ' - ' + err.message);
                log('Error stack: ' + err.stack);
                updateStatus('❌ Error: ' + err.name + ' - ' + err.message, 'error');
                btn.textContent = 'Failed - Click to Retry';
                btn.disabled = false;
            }
        }
        
        log('Page loaded. Waiting for button click.');
        log('navigator.userAgent: ' + navigator.userAgent);
    </script>
</body>
</html>
